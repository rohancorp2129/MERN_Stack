    <!-- 
    Varibales :
            These area used to store data,
            It actually alllocated some space in memory for the data 
        
            Variable - is made up of a declarator and an identifier .

        var a =10 ;  //   "var" is a (declarator) and  "a" is an identifier

        Rules to write identifier  : 
            1. It should not contain any symbol, except for '_' and '$' 
            2. It should not start with a number but it can end with number
                The name of an identifier should not be number 
            3. If the name of identifier is made of two numbers , we cant use between them.
                Insted we can use '_' camelcasing or pascalcasing 
                camelcasing : first letter of first word should be small and first letter of second word should be capital(rohanRakh)
                Pascalcasing : first letter of first word should be capital and first letter of second word should be capital (RohanRakh)

            4 The name of identifier should not be reserved keyword ( var if , var let , let for ---- Not allowed  )



    Declarators : 

        These are reserved keywords of Javascript 


        1. var :
                This is from the old javascript 
                It is a global scope declarator 
                re-declaration is allowed
                re- Initilization is allowed
        
        2. let 
                It is a feature from Modern Js ( ES6)  ECMAScript
                It is block scope declarator
                re-declaration is not allowed
                re- Initilization is allowed
                not hoisted


        
        3 const :
                This is a feature from Modern Js ( ES6)
                It is block scope declarator
                It can not be re- Initilized nor re-declared
