    <!-- 
    Modern Js Operators :

    1. typeof : It is used to describe the datatype of the variable or value
        ex : 
            var a = 10;
            console.log(typeof a);  // number

            var b = "Rohan";
            console.log(typeof b);  // string

            var c = true;
            console.log(typeof c);  // boolean

            var d = null;
            console.log(typeof d);  // object

            var e;
            console.log(typeof e);  // undefined

            var f = [1,2,3,4,5];
            console.log(typeof f);  // object

            var g = {name : "Rohan", age : 25};
            console.log(typeof g);  // object

    2. ternary operator : It is used to write the conditional statement in a single line
        Syntax : 
            console.log(condition ? true : false);
        ex : 
            var a = 10;
            var b = 20;
            var c = a>b ? "A is greater" : "B is greater";
            console.log(c);// B is greater

    3. nullish coalescing operator ( nalish kolshing operator)
        It is uses the value of the variable is assigned, if the value is not assigned then it will use first parameter .
        
        It is denoted using  [variabale ?? "default value"]
        
        It is used to check the null or undefined value
        Syntax : 
            console.log(a ?? b);
        ex : 
            var a = null;
            var b = 20;
            console.log(a ?? b); // 20

    4. Exponentiation Operator : It is used to calculate the power of the number
            It is denoted using **
            [number ** power]
        Syntax : 
            console.log(a**b);
        ex : 
            var a = 2;
            var b = 3;
            console.log(a**b); // 8

    5. Concatenation Operator : It is used to concatenate the string


    //interview Q what is string coersion : console.log(10+"5"); // 105
        Syntax : 
            console.log("Rohan" + "Rakh");
