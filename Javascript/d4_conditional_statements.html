    *******************************************************************************


    Conditional Statements :

    1. if :
    2. else
    3. else if
    4. switch

    1. if : It is used to check the condition and execute the code if the condition is true
        Syntax : 
            if(condition){
                // code
            }
        ex : 
            var a = 10;
            if(a>5){
                console.log("A is greater than 5");
            }
    
    2. else : It is used to execute the code if the condition is false
    Syntax : 
        if(condition){
            // code
        }else{
            // code
        }
    ex :
    var a = 10;
    if(a>15){
        console.log("A is greater than 15");
    }else{
        console.log("A is less than 15");
    }

    3. else if : It is used to check the multiple conditions
    Syntax : 
        if(condition){
            // code
        }else if(condition){
            // code
        }else{
            // code
        }
    ex :
    var a = 10;
    if(a>15){
        console.log("A is greater than 15");
    }else if(a>5){
        console.log("A is greater than 5");
    }else{
        console.log("A is less than 5");
    }

    4. switch : It is used to check the multiple conditions
    Syntax :
        switch(expression){
            case value1:
                // code
                break;
            case value2:
                // code
                break;
            case value3:
                // code
                break;
            default:
                // code
        }
    //             

    ex :
    var a = 10;
    switch(a){
    case 10:
        console.log("A is 10");
        break;
    case 20:
        console.log("A is 20");
        break;
    case 30:
        console.log("A is 30");
        break;
    default:
        console.log("A is not 10, 20, 30");
    }

    -->
