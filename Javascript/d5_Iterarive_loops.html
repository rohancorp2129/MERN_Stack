<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 
    Iterative Loops : It is a type of statement which is used to execute a block of code repeatedly until the given condition is valid 


    1. do while  : The code is executed first and them the conditioin is checked 
                    : It is used to execute the code at least once
        syntax :
        do{
        // code to be executed
        }while(condition);

        ex :
        var i = 1;
        do{
            console.log(i);
            i++;
        }while(i<=5);


    2. while   : The condition is checked first and then the code is executed,
                    : It is used to execute the code only if the condition is valid

                   Ex . while api ka data aa raha hain , execute what ever data was give 
        syntax :
        while(condition){
            // code to be executed
        }

        ex :
        var i = 1;
        while(i<=5){
            console.log(i);
            i++;
        }

    3. for loop : It is used to execute the code for a specific number of times
            Ex. You have to know how many times you have to loop it 
        syntax :
        for(initialization; condition; increment){
            // code to be executed
        }

        ex :
        for(var i=1; i<=5; i++){
            console.log(i);
        } 
    -->
    <script>
        // do while loop
        let num =1;  // initialization
        // do{
        //     console.log(num);
        //     num++;  // increment
        // }while(num<=5);  // condition


        // while loop
        while(num<=10){
            console.log(num);
            num++;
        }

        // for loop
        console.log("In for loop !");
        
        for(let num1=2; num1<=50; num1 +=2){
            console.log(num1);
        }
    </script>
</body>
</html>
