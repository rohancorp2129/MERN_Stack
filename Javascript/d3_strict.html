<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 
     : it is a rule, which is used to write the code in a strict way.
    It tells the browser how to execute a js code in a strict way.
    It is used to avoid the common errors in the code
    It is used to avoid the use of undeclared variables




    -->

    <script>
        "use strict";  // It can be used in block scope or in function scope or in global scope
        a=10;     // initialization
        console.log(a);   // use

        var a;  // declaration

        function demo(){
            console.log("Hello , THis is fun. written at the end of code ");
        }
        demo();
    </script>
</body>
</html>
