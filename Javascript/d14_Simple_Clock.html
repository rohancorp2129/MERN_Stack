<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <style>
        body {
            background-color: black;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Container with Glassmorphism Effect */
        #clock-container {
            background: linear-gradient(135deg, rgba(255, 0, 150, 0.2), rgba(0, 255, 255, 0.2));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0px 10px 20px rgba(255, 255, 255, 0.2);
            width: 480px;
            height: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        /* Neon Effect for Time */
        #time {
            font-size: 70px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 15px;
            white-space: nowrap;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8), 0 0 20px rgba(0, 255, 255, 0.6);
        }

        /* Links in One Line with Smooth Glow */
        /* .links {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .links a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            padding: 8px 14px;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(255, 0, 150, 0.6), rgba(0, 255, 255, 0.6));
            transition: all 0.3s ease-in-out;
            text-align: center;
            box-shadow: 0px 5px 15px rgba(255, 255, 255, 0.3);
            font-weight: bold;
        }

        .links a:hover {
            background: linear-gradient(135deg, rgba(255, 0, 150, 0.8), rgba(0, 255, 255, 0.8));
            transform: scale(1.1);
            box-shadow: 0px 10px 25px rgba(255, 255, 255, 0.5);
        } */

        /* Responsive design for smaller screens */
        @media (max-width: 450px) {
            #clock-container {
                width: 90%;
            }
            #time {
                font-size: 50px;
            }
            .links {
                flex-wrap: wrap;
                gap: 8px;
            }
            .links a {
                font-size: 14px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
    <div id="clock-container">
        <h1 id="time"></h1>
        <!-- <div class="links">
            <a href="https://www.google.com" target="_blank">Google</a>
            <a href="https://drive.google.com" target="_blank">Drive</a>
            <a href="https://web.whatsapp.com" target="_blank">WhatsApp</a>
            <a href="https://www.youtube.com" target="_blank">YouTube</a>
            <a href="https://mail.google.com" target="_blank">Gmail</a>
        </div> -->
    </div>
    <script>
        function updateClock() {
            let timeNow = new Date();
            let hours = timeNow.getHours();
            let minutes = timeNow.getMinutes();
            let seconds = timeNow.getSeconds();
            let ampm = hours >= 12 ? 'PM' : 'AM';

            hours = hours % 12 || 12;  // Convert 24-hour format to 12-hour format
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;

            document.getElementById("time").innerHTML = `${hours} : ${minutes} : ${seconds} ${ampm}`;
        }

        setInterval(updateClock, 1000);
        updateClock();  // Call immediately to avoid delay
    </script>
</body>
</html>
