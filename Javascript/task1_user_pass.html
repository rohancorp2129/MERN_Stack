the code will check if username matches 'admin' , it is same , it will check password ' 1234'

If the password does not match , it will give error that pass is incorrect 
if hte pass matched , it will display " logged in successfully !"

if the uname does not found 'admin ' it will display ' user not found'

-->


<script>

    // let username="admin";
    // let password="1234";

    let uname = prompt("Enter your username : ");
    let pass = prompt("Enter your password : ");

    if(uname=="admin"){
        if(pass=="1234"){
            document.write(`<h1> Logged in successfully ! </h1>`);
        }
        else{
            document.write(`<h1> Password is incorrect ! </h1>`);
        }
    }
    else{
        document.write(`<h1> User not found ! </h1>`);
    }
</script>
