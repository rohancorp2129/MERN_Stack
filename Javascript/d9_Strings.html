    String : String is a primary datatype , 
            IT is a collection of charachers(alphabate , symbpl, numbers)
            it is immutable
            IT is denoted by '' or ""
            Just like an array , string also has numeric indexing which starts from zero


        Creating String :

        1. Literal Stirng 
        2. Creating as instance

    
    Methods of String :
    1. length() : returns the length of the string
    2. slice(starting index , last endex ) :
    3. substring(): not allowed -ve index , work like slice 
    4. toUpperCase() : converts the string to upper case
    5. toLowerCase() : converts the string to lower case
    6. trim() : removes the leading and trailing spaces
    7. split(char/symbol/..) : splits the string into array of strings
    8. join() : joins the array of strings into a single string
    9. substr(start_index, no_of_index) : same like substring , but not allowed -ve index 
    10. indexOf(character) : it gives us first given char's index  , It is case Sensetive 
                            return -1 if char not available 
    11. concat():
    12. replace():
    13. lastIndexOf(character):It gives us last given char's index  , It is case Sensetive 
                            return -1 if char not available 
    14. charAt(index_position);
    15. charCodeAt(char) : returns ASCII code of character available at that index position , 
                        return NAN ( not a numer ) of index posioion not found 

    16. includes(char/str): it retunrs true/false depending upon the availibility ......
    17. replace(char to find , char to replace)
    18. pad() : if you wanna increase length , 
            padEnd(how many length total , inserrt char at end)
            padStart(how many length total , inserrt char at start)
